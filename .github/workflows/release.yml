name: Build & Release

on:
  push:
    branches: [main]
    paths: ['package.json']
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if already released
        if: steps.check_tag.outputs.exists == 'true' && github.event_name != 'workflow_dispatch'
        run: |
          echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping build."
          exit 0

      - uses: actions/setup-node@v5
        if: steps.check_tag.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        if: steps.check_tag.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        run: yarn install --immutable

      - name: Import signing certificate
        if: steps.check_tag.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p actions "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p actions "$KEYCHAIN_PATH"
          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          rm certificate.p12

      - name: Build distributables
        if: steps.check_tag.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: yarn make

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain" 2>/dev/null || true

      - name: Create tag
        if: steps.check_tag.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Upload artifacts
        if: steps.check_tag.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v5
        with:
          name: macos-build
          path: out/make/**/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          draft: false
          generate_release_notes: true
          files: |
            out/make/zip/darwin/**/*.zip
            out/make/*.dmg
